<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NodeBoard — Distributed Whiteboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 38 38'%3E%3Crect x='2' y='3' width='34' height='26' rx='3.5' fill='%23FFFFFF' stroke='%234ECDC4' stroke-width='1.8'/%3E%3Ccircle cx='9' cy='22' r='4' fill='%23FF6B6B'/%3E%3Ccircle cx='19' cy='11' r='4' fill='%23FFE66D'/%3E%3Ccircle cx='29' cy='22' r='4' fill='%234ECDC4'/%3E%3Cline x1='9' y1='22' x2='19' y2='11' stroke='%23FF6B6B' stroke-width='1.5'/%3E%3Cline x1='19' y1='11' x2='29' y2='22' stroke='%23FF6B6B' stroke-width='1.5'/%3E%3Cline x1='9' y1='22' x2='29' y2='22' stroke='%23FF6B6B' stroke-width='1.5'/%3E%3C/svg%3E">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg:        #0E1117;
      --toolbar:   #161B27;
      --panel:     #1E2535;
      --border:    #2D3650;
      --accent:    #FF6B6B;
      --accent2:   #4ECDC4;
      --accent3:   #FFE66D;
      --accent4:   #A8E6CF;
      --text:      #E8EAF0;
      --muted:     #6B7280;
      --dot:       rgba(0,0,0,0.10);
    }

    body {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh; /* dynamic viewport height — fixes mobile browser bar issues */
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      height: 54px;
      background: var(--toolbar);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
      overflow-x: auto;        /* toolbar scrolls horizontally on small screens */
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;   /* hide scrollbar but keep scroll */
    }
    #toolbar::-webkit-scrollbar { display: none; }

    #logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-right: 8px;
      flex-shrink: 0;
    }
    #logo span {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.5px;
    }

    .div { width:1px; height:32px; background:var(--border); margin:0 4px; flex-shrink:0; }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 3px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      flex-shrink: 0;
    }

    .tool-btn {
      width: 34px; height: 34px;
      border: none; border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: all 0.15s;
      position: relative;
      flex-shrink: 0;
    }
    .tool-btn:hover { background: var(--border); color: var(--text); }
    .tool-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 0 2px rgba(255,107,107,0.3);
    }
    .tool-btn[data-tool="eraser"].active { background: var(--accent2); box-shadow: 0 0 0 2px rgba(78,205,196,0.3); }
    .tool-btn[data-tool="shapes"].active { background: var(--accent3); color:#333; box-shadow: 0 0 0 2px rgba(255,230,109,0.3); }
    .tool-btn[data-tool="text"].active   { background: var(--accent4); color:#333; box-shadow: 0 0 0 2px rgba(168,230,207,0.3); }

    .tool-btn::after {
      content: attr(data-tip);
      position: absolute;
      bottom: -30px; left: 50%;
      transform: translateX(-50%);
      background: #000;
      color: #fff;
      font-size: 10px;
      padding: 3px 7px;
      border-radius: 5px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 100;
    }
    .tool-btn:hover::after { opacity: 1; }

    #colorPicker {
      width: 34px; height: 34px;
      border: 2px solid var(--border);
      border-radius: 50%;
      padding: 0;
      cursor: pointer;
      background: none;
      overflow: hidden;
      flex-shrink: 0;
    }
    #colorPicker::-webkit-color-swatch-wrapper { padding: 0; }
    #colorPicker::-webkit-color-swatch { border: none; border-radius: 50%; }

    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px 10px;
      flex-shrink: 0;
    }
    .slider-wrap label { font-size: 10px; color: var(--muted); white-space: nowrap; }
    .slider-wrap input[type=range] {
      width: 70px; height: 4px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .slider-wrap span { font-size: 10px; color: var(--text); min-width: 24px; }

    #shape-picker {
      display: none;
      align-items: center;
      gap: 3px;
      background: var(--panel);
      border: 1px solid var(--accent3);
      border-radius: 10px;
      padding: 4px;
      flex-shrink: 0;
    }
    #shape-picker.visible { display: flex; }
    .shape-btn {
      width: 30px; height: 30px;
      border: none; border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .shape-btn:hover { background: var(--border); color: var(--text); }
    .shape-btn.active { background: var(--accent3); color: #333; }

    #actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .action-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .action-btn:hover { border-color: var(--accent); color: var(--accent); }
    .action-btn.danger:hover { border-color: #FF4444; color: #FF4444; }

    #status {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: var(--panel);
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    #status .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
    }
    #status.connected .dot { background: #4ECDC4; box-shadow: 0 0 6px #4ECDC4; }
    #status.connected { color: var(--text); }
    #status.disconnected { color: var(--muted); }

    /* ── Canvas area ── */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;       /* canvas fills exact space, no scroll needed */
      background: #FFFFFF;
      touch-action: none;     /* moved here from canvas element — more reliable */
    }

    #canvas-wrap::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    #canvas {
      position: absolute; inset: 0;
      /* touch-action removed here — handled by parent */
      cursor: crosshair;
      z-index: 1;
    }

    #text-input {
      display: none;
      position: absolute;
      z-index: 20;
      background: transparent;
      border: 2px dashed var(--accent4);
      border-radius: 4px;
      color: #333;
      font-size: 18px;
      padding: 4px 8px;
      min-width: 120px;
      min-height: 32px;
      outline: none;
      resize: both;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .remote-cursor {
      position: absolute;
      pointer-events: none;
      z-index: 15;
      transition: left 0.05s, top 0.05s;
    }
    .remote-cursor .cursor-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 2px solid white;
      margin-left: -5px;
      margin-top: -5px;
    }
    .remote-cursor .cursor-label {
      font-size: 10px;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 2px 5px;
      border-radius: 4px;
      margin-top: 4px;
      white-space: nowrap;
    }

    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 12px;
      transition: transform 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="toolbar">
  <div id="logo">
    <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="3" width="34" height="26" rx="3.5" fill="#FFFFFF" stroke="#4ECDC4" stroke-width="1.8"/>
      <line x1="14" y1="29" x2="11" y2="35" stroke="#4ECDC4" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="24" y1="29" x2="27" y2="35" stroke="#4ECDC4" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="10" y1="35" x2="28" y2="35" stroke="#4ECDC4" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="9"  cy="10" r="0.9" fill="#CBD5E0"/>
      <circle cx="19" cy="10" r="0.9" fill="#CBD5E0"/>
      <circle cx="29" cy="10" r="0.9" fill="#CBD5E0"/>
      <circle cx="9"  cy="16" r="0.9" fill="#CBD5E0"/>
      <circle cx="19" cy="16" r="0.9" fill="#CBD5E0"/>
      <circle cx="29" cy="16" r="0.9" fill="#CBD5E0"/>
      <circle cx="9"  cy="22" r="0.9" fill="#CBD5E0"/>
      <circle cx="19" cy="22" r="0.9" fill="#CBD5E0"/>
      <circle cx="29" cy="22" r="0.9" fill="#CBD5E0"/>
      <line x1="9" y1="22" x2="19" y2="10" stroke="#FF6B6B" stroke-width="1" stroke-dasharray="2 1.5" opacity="0.6"/>
      <line x1="19" y1="10" x2="29" y2="22" stroke="#FF6B6B" stroke-width="1" stroke-dasharray="2 1.5" opacity="0.6"/>
      <line x1="9"  y1="22" x2="29" y2="22" stroke="#FF6B6B" stroke-width="1" stroke-dasharray="2 1.5" opacity="0.6"/>
      <path d="M8 21 C11 14, 16 18, 19 11 C22 5, 27 14, 30 10" stroke="#FF6B6B" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <circle cx="9"  cy="22" r="2.8" fill="#FF6B6B"/>
      <circle cx="19" cy="11" r="2.8" fill="#FFE66D" stroke="#FFC300" stroke-width="0.8"/>

      <rect x="28" y="1" width="4" height="10" rx="1.5" transform="rotate(35 30 6)" fill="#FFE66D" stroke="#FFC300" stroke-width="0.5"/>
      <polygon points="27,10 31,10 29,14" fill="#1E2535" transform="rotate(35 29 12)"/>
    </svg>
    <span>NodeBoard</span>
  </div>

  <div class="div"></div>

  <div class="tool-group">
    <button class="tool-btn active" data-tool="pen"    data-tip="Pen">✒️</button>
    <button class="tool-btn"        data-tool="marker" data-tip="Marker">🖊️</button>
    <button class="tool-btn"        data-tool="brush"  data-tip="Round Brush">🖌️</button>
    <button class="tool-btn"        data-tool="square" data-tip="Square Brush">⬛</button>
    <button class="tool-btn"        data-tool="eraser" data-tip="Eraser Brush">🩹</button>
  </div>

  <div class="tool-group">
    <button class="tool-btn" data-tool="shapes" data-tip="Shapes" id="shapes-toggle">⬡</button>
    <button class="tool-btn" data-tool="text"   data-tip="Text">T</button>
  </div>

  <div id="shape-picker">
    <button class="shape-btn active" data-shape="rect"     title="Rectangle">▭</button>
    <button class="shape-btn"        data-shape="circle"   title="Circle">○</button>
    <button class="shape-btn"        data-shape="arrow"    title="Arrow">→</button>
    <button class="shape-btn"        data-shape="line"     title="Line">╱</button>
    <button class="shape-btn"        data-shape="triangle" title="Triangle">△</button>
  </div>

  <div class="div"></div>

  <input type="color" id="colorPicker" value="#FF6B6B" title="Color">

  <div class="slider-wrap">
    <label>Size</label>
    <input type="range" id="sizePicker" min="1" max="40" value="4">
    <span id="sizeVal">4</span>
  </div>

  <div class="slider-wrap">
    <label>Opacity</label>
    <input type="range" id="opacityPicker" min="10" max="100" value="100">
    <span id="opacityVal">100%</span>
  </div>

  <div id="actions">
    <button class="action-btn" onclick="undoLast()">↩ Undo</button>
    <button class="action-btn danger" onclick="clearAll()">🗑 Clear All</button>
    <div id="status" class="disconnected">
      <span class="dot"></span>
      <span id="status-text">Connecting…</span>
    </div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <input type="text" id="text-input" placeholder="Type here…">
</div>

<div id="toast"></div>

<script>
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d');
const wrap      = document.getElementById('canvas-wrap');
const textInput = document.getElementById('text-input');

let userId = localStorage.getItem('wb_userId');
if (!userId) {
  userId = 'user_' + Math.random().toString(36).slice(2, 9);
  localStorage.setItem('wb_userId', userId);
}
const userColor = '#' + Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,'0');

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = wrap.offsetWidth  * dpr;
  canvas.height = wrap.offsetHeight * dpr;
  canvas.style.width  = wrap.offsetWidth  + 'px';
  canvas.style.height = wrap.offsetHeight + 'px';
  ctx.scale(dpr, dpr);
  replayHistory();
}
window.addEventListener('resize', resizeCanvas);

// Also handle mobile address bar show/hide
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 300));

let currentTool  = 'pen';
let currentShape = 'rect';
let isDrawing    = false;
let startX = 0, startY = 0, lastX = 0, lastY = 0;
let strokeId     = null;
let remoteCursors = {};
let localHistory = [];

document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tool = btn.dataset.tool;
    if (tool === 'shapes') {
      const picker = document.getElementById('shape-picker');
      picker.classList.toggle('visible');
      document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
      if (picker.classList.contains('visible')) {
        btn.classList.add('active');
        currentTool = 'shapes';
      } else {
        currentTool = 'pen';
        document.querySelector('[data-tool="pen"]').classList.add('active');
      }
      return;
    }
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTool = tool;
    if (tool !== 'shapes') document.getElementById('shape-picker').classList.remove('visible');
    canvas.style.cursor = tool === 'eraser' ? 'cell' : tool === 'text' ? 'text' : 'crosshair';
  });
});

document.querySelectorAll('.shape-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentShape = btn.dataset.shape;
  });
});

const sizePicker    = document.getElementById('sizePicker');
const sizeVal       = document.getElementById('sizeVal');
const opacityPicker = document.getElementById('opacityPicker');
const opacityVal    = document.getElementById('opacityVal');
const colorPicker   = document.getElementById('colorPicker');

sizePicker.addEventListener('input',    () => sizeVal.textContent = sizePicker.value);
opacityPicker.addEventListener('input', () => opacityVal.textContent = opacityPicker.value + '%');

const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
const host     = location.host;
let ws;

function connectWebSocket() {
  ws = new WebSocket(`${protocol}//${host}/ws`);
  ws.onopen = () => {
    const el = document.getElementById('status');
    el.className = 'connected';
    document.getElementById('status-text').textContent = 'Connected';
  };
  ws.onclose = () => {
    const el = document.getElementById('status');
    el.className = 'disconnected';
    document.getElementById('status-text').textContent = 'Reconnecting…';
    setTimeout(connectWebSocket, 2000);
  };
  ws.onmessage = (event) => handleEvent(JSON.parse(event.data));
}
connectWebSocket();

function safeSend(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

function handleEvent(data) {
  if (data.type === 'clear')  { localHistory = []; ctx.clearRect(0,0,canvas.offsetWidth,canvas.offsetHeight); return; }
  if (data.type === 'redraw') { replayHistory(); return; }
  if (data.type === 'cursor') { showRemoteCursor(data); return; }
  localHistory.push(data);
  renderEvent(data);
}

function replayHistory() {
  ctx.clearRect(0, 0, canvas.offsetWidth, canvas.offsetHeight);
  for (const e of localHistory) renderEvent(e);
}

function renderEvent(data) {
  if (data.type === 'stroke') drawSegment(data);
  else if (data.type === 'shape') drawShape(data);
  else if (data.type === 'text')  drawText(data);
}

function newStrokeId() {
  return userId + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
}

function settings() {
  return {
    color:   currentTool === 'eraser' ? '__erase__' : colorPicker.value,
    size:    parseInt(sizePicker.value),
    opacity: parseInt(opacityPicker.value) / 100,
    tool:    currentTool,
  };
}

function applyCtx(s) {
  if (s.color === '__erase__') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = s.color;
    ctx.fillStyle   = s.color;
  }
  ctx.globalAlpha = s.opacity !== undefined ? s.opacity : 1;
  ctx.lineWidth   = s.size;
  ctx.lineCap     = s.tool === 'square' ? 'square' : 'round';
  ctx.lineJoin    = 'round';
  if (s.tool === 'marker') {
    ctx.globalAlpha = (s.opacity || 1) * 0.6;
    ctx.lineWidth   = s.size * 2.5;
    ctx.lineCap     = 'square';
  }
  if (s.tool === 'pen') ctx.lineWidth = Math.max(1, s.size * 0.6);
}

function drawSegment(data) {
  applyCtx(data);
  ctx.beginPath();
  ctx.moveTo(data.x0, data.y0);
  ctx.lineTo(data.x1, data.y1);
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
}

function drawShape(data) {
  applyCtx(data);
  ctx.beginPath();
  const dx = data.x1 - data.x0;
  const dy = data.y1 - data.y0;
  switch (data.shape) {
    case 'rect':
      ctx.strokeRect(data.x0, data.y0, dx, dy); break;
    case 'circle': {
      const cx = data.x0+dx/2, cy = data.y0+dy/2;
      ctx.ellipse(cx, cy, Math.abs(dx/2), Math.abs(dy/2), 0, 0, Math.PI*2);
      ctx.stroke(); break;
    }
    case 'line':
      ctx.moveTo(data.x0, data.y0); ctx.lineTo(data.x1, data.y1); ctx.stroke(); break;
    case 'triangle':
      ctx.moveTo(data.x0+dx/2, data.y0);
      ctx.lineTo(data.x0, data.y1);
      ctx.lineTo(data.x1, data.y1);
      ctx.closePath(); ctx.stroke(); break;
    case 'arrow': {
      ctx.moveTo(data.x0, data.y0); ctx.lineTo(data.x1, data.y1); ctx.stroke();
      const angle = Math.atan2(dy, dx);
      const hs = Math.max(10, data.size * 3);
      ctx.beginPath();
      ctx.moveTo(data.x1, data.y1);
      ctx.lineTo(data.x1 - hs*Math.cos(angle-Math.PI/6), data.y1 - hs*Math.sin(angle-Math.PI/6));
      ctx.moveTo(data.x1, data.y1);
      ctx.lineTo(data.x1 - hs*Math.cos(angle+Math.PI/6), data.y1 - hs*Math.sin(angle+Math.PI/6));
      ctx.stroke(); break;
    }
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
}

function drawText(data) {
  ctx.globalAlpha = data.opacity || 1;
  ctx.fillStyle   = data.color;
  ctx.font        = `${data.size * 4 + 10}px 'Segoe UI', sans-serif`;
  ctx.fillText(data.text, data.x, data.y);
  ctx.globalAlpha = 1;
}

function drawShapePreview(x0, y0, x1, y1) {
  replayHistory();
  const s = settings();
  applyCtx(s);
  drawShape({ ...s, shape: currentShape, x0, y0, x1, y1 });
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

// ── Mouse events ──────────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', (e) => {
  const {x, y} = getPos(e);
  if (currentTool === 'text') { openTextInput(x, y); return; }
  isDrawing = true;
  startX = lastX = x;
  startY = lastY = y;
  strokeId = newStrokeId();
});

canvas.addEventListener('mousemove', (e) => {
  const {x, y} = getPos(e);
  if (Math.random() < 0.3) safeSend({ type:'cursor', userId, color:userColor, x, y });
  if (!isDrawing) return;
  if (currentTool === 'shapes') { drawShapePreview(startX, startY, x, y); return; }
  const s = settings();
  safeSend({ type:'stroke', strokeId, userId, x0:lastX, y0:lastY, x1:x, y1:y, ...s });
  lastX = x; lastY = y;
});

canvas.addEventListener('mouseup', (e) => {
  if (!isDrawing) return;
  isDrawing = false;
  const {x, y} = getPos(e);
  if (currentTool === 'shapes') {
    safeSend({ type:'shape', strokeId, userId, shape:currentShape,
               x0:startX, y0:startY, x1:x, y1:y, ...settings() });
  }
  strokeId = null;
});

canvas.addEventListener('mouseleave', () => { isDrawing = false; });

// ── Touch events ──────────────────────────────────────────────────────────────
function getTouchPos(e) {
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  return { x: t.clientX - rect.left, y: t.clientY - rect.top };
}

// touchstart: always begin drawing, always prevent default to stop
// the browser claiming the touch for scroll/zoom on the canvas
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  isDrawing = true;
  const {x, y} = getTouchPos(e);
  if (currentTool === 'text') {
    isDrawing = false;
    openTextInput(x, y);
    return;
  }
  startX = lastX = x;
  startY = lastY = y;
  strokeId = newStrokeId();
}, { passive: false });

// touchmove: only block scroll WHILE actively drawing on the canvas
canvas.addEventListener('touchmove', (e) => {
  if (!isDrawing) return;   // not drawing — allow natural scroll
  e.preventDefault();        // drawing — block scroll so the stroke tracks finger
  const {x, y} = getTouchPos(e);
  if (currentTool === 'shapes') { drawShapePreview(startX, startY, x, y); return; }
  safeSend({ type:'stroke', strokeId, userId, x0:lastX, y0:lastY, x1:x, y1:y, ...settings() });
  lastX = x; lastY = y;
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  if (!isDrawing) return;
  isDrawing = false;
  if (currentTool === 'shapes') {
    const t = e.changedTouches[0];
    const rect = canvas.getBoundingClientRect();
    safeSend({ type:'shape', strokeId, userId, shape:currentShape,
               x0:startX, y0:startY,
               x1:t.clientX - rect.left, y1:t.clientY - rect.top,
               ...settings() });
  }
  strokeId = null;
});

canvas.addEventListener('touchcancel', () => { isDrawing = false; strokeId = null; });

// ── Text tool ──────────────────────────────────────────────────────────────────
let textX = 0, textY = 0;
function openTextInput(x, y) {
  textX = x; textY = y;
  textInput.style.display  = 'block';
  textInput.style.left     = x + 'px';
  textInput.style.top      = (y - 24) + 'px';
  textInput.style.color    = colorPicker.value;
  textInput.style.fontSize = (parseInt(sizePicker.value) * 4 + 10) + 'px';
  textInput.value = '';
  textInput.focus();
}
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commitText(); }
  if (e.key === 'Escape') textInput.style.display = 'none';
});
textInput.addEventListener('blur', commitText);
function commitText() {
  const text = textInput.value.trim();
  textInput.style.display = 'none';
  if (!text) return;
  safeSend({ type:'text', strokeId:newStrokeId(), userId, text, x:textX, y:textY, ...settings() });
}

// ── Undo & Clear ───────────────────────────────────────────────────────────────
function undoLast() {
  let targetStrokeId = null;
  for (let i = localHistory.length - 1; i >= 0; i--) {
    if (localHistory[i].userId === userId) {
      targetStrokeId = localHistory[i].strokeId;
      break;
    }
  }
  if (!targetStrokeId) { showToast('Nothing to undo'); return; }
  localHistory = localHistory.filter(e => e.strokeId !== targetStrokeId);
  replayHistory();
  safeSend({ type:'undo', userId, strokeId: targetStrokeId });
  showToast('Undone ↩');
}

function clearAll() {
  if (!confirm('Clear the entire board for everyone?')) return;
  localHistory = [];
  ctx.clearRect(0, 0, canvas.offsetWidth, canvas.offsetHeight);
  safeSend({ type:'clear' });
}

document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undoLast(); }
});

// ── Remote cursors ─────────────────────────────────────────────────────────────
function showRemoteCursor(data) {
  if (data.userId === userId) return;
  let el = remoteCursors[data.userId]?.el;
  if (!el) {
    el = document.createElement('div');
    el.className = 'remote-cursor';
    el.innerHTML = `<div class="cursor-dot" style="background:${data.color}"></div>
                    <div class="cursor-label" style="background:${data.color}">${data.userId.slice(5,10)}</div>`;
    wrap.appendChild(el);
    remoteCursors[data.userId] = { el };
  }
  el.style.left = data.x + 'px';
  el.style.top  = data.y + 'px';
  clearTimeout(remoteCursors[data.userId].timeout);
  remoteCursors[data.userId].timeout = setTimeout(() => {
    el.remove();
    delete remoteCursors[data.userId];
  }, 3000);
}

// ── Toast ──────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ── Init ───────────────────────────────────────────────────────────────────────
resizeCanvas();
</script>
</body>
</html>
