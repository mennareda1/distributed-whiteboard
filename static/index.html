<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NodeBoard — Distributed Whiteboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 38 38'%3E%3Crect x='2' y='3' width='34' height='26' rx='3.5' fill='%23FFFFFF' stroke='%234ECDC4' stroke-width='1.8'/%3E%3Ccircle cx='9' cy='22' r='4' fill='%23FF6B6B'/%3E%3Ccircle cx='19' cy='11' r='4' fill='%23FFE66D'/%3E%3Ccircle cx='29' cy='22' r='4' fill='%234ECDC4'/%3E%3C/svg%3E">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#0E1117; --toolbar:#161B27; --panel:#1E2535; --border:#2D3650;
      --accent:#FF6B6B; --accent2:#4ECDC4; --accent3:#FFE66D; --accent4:#A8E6CF; --accent5:#A78BFA;
      --text:#E8EAF0; --muted:#6B7280;
    }
    html,body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; }

    #toolbar {
      position:fixed; top:0; left:0; right:0; height:52px;
      background:var(--toolbar); border-bottom:1px solid var(--border);
      z-index:100; display:flex; align-items:center; gap:4px; padding:0 8px;
      overflow-x:auto; overflow-y:hidden;
      -webkit-overflow-scrolling:touch; scrollbar-width:none;
    }
    #toolbar::-webkit-scrollbar { display:none; }

    #logo { display:flex; align-items:center; gap:6px; flex-shrink:0; margin-right:4px; }
    #logo span { font-size:13px; font-weight:700; color:var(--text); }

    .sep { width:1px; height:28px; background:var(--border); flex-shrink:0; margin:0 2px; }

    .tool-group {
      display:flex; align-items:center; gap:2px;
      background:var(--panel); border:1px solid var(--border);
      border-radius:9px; padding:3px; flex-shrink:0;
    }
    .tb {
      width:32px; height:32px; border:none; border-radius:7px;
      background:transparent; color:var(--muted); cursor:pointer;
      font-size:15px; display:flex; align-items:center; justify-content:center;
      transition:all 0.12s; flex-shrink:0; position:relative;
    }
    .tb:hover { background:var(--border); color:var(--text); }
    .tb.active { background:var(--accent); color:#fff; box-shadow:0 0 0 2px rgba(255,107,107,0.3); }
    .tb[data-tool="pan"].active    { background:var(--accent5); box-shadow:0 0 0 2px rgba(167,139,250,0.3); }
    .tb[data-tool="eraser"].active { background:var(--accent2); box-shadow:0 0 0 2px rgba(78,205,196,0.3); }
    .tb[data-tool="shapes"].active { background:var(--accent3); color:#333; box-shadow:none; }
    .tb[data-tool="text"].active   { background:var(--accent4); color:#333; box-shadow:none; }
    .tb[data-tip]:hover::after {
      content:attr(data-tip); position:absolute; bottom:-24px; left:50%;
      transform:translateX(-50%); background:#000; color:#fff;
      font-size:9px; padding:2px 6px; border-radius:4px; white-space:nowrap; z-index:200;
    }

    #shape-picker {
      display:none; align-items:center; gap:2px;
      background:var(--panel); border:1px solid var(--accent3);
      border-radius:9px; padding:3px; flex-shrink:0;
    }
    #shape-picker.open { display:flex; }
    .sb {
      width:28px; height:28px; border:none; border-radius:6px;
      background:transparent; color:var(--muted); cursor:pointer;
      font-size:13px; display:flex; align-items:center; justify-content:center; transition:all 0.12s;
    }
    .sb:hover { background:var(--border); color:var(--text); }
    .sb.active { background:var(--accent3); color:#333; }

    #colorPicker {
      width:32px; height:32px; border:2px solid var(--border); border-radius:50%;
      padding:0; cursor:pointer; background:none; overflow:hidden; flex-shrink:0;
    }
    #colorPicker::-webkit-color-swatch-wrapper { padding:0; }
    #colorPicker::-webkit-color-swatch { border:none; border-radius:50%; }

    .sl-wrap {
      display:flex; align-items:center; gap:5px;
      background:var(--panel); border:1px solid var(--border);
      border-radius:9px; padding:3px 8px; flex-shrink:0;
    }
    .sl-wrap label { font-size:9px; color:var(--muted); white-space:nowrap; }
    .sl-wrap input[type=range] { width:60px; accent-color:var(--accent); cursor:pointer; }
    .sl-wrap span { font-size:9px; color:var(--text); min-width:20px; }

    #zoom-controls {
      display:flex; align-items:center; gap:2px;
      background:var(--panel); border:1px solid var(--border);
      border-radius:9px; padding:3px; flex-shrink:0;
    }
    #zoom-level { font-size:9px; color:var(--muted); min-width:34px; text-align:center; }

    #actions { display:flex; align-items:center; gap:4px; flex-shrink:0; }
    .ab {
      display:flex; align-items:center; gap:4px; padding:5px 10px;
      border:1px solid var(--border); border-radius:7px;
      background:var(--panel); color:var(--text); font-size:11px;
      cursor:pointer; transition:all 0.12s; white-space:nowrap; flex-shrink:0;
    }
    .ab:hover { border-color:var(--accent); color:var(--accent); }
    .ab.danger:hover { border-color:#FF4444; color:#FF4444; }

    #status {
      display:flex; align-items:center; gap:4px; padding:3px 8px;
      border-radius:16px; font-size:10px; font-weight:600;
      background:var(--panel); border:1px solid var(--border);
      white-space:nowrap; flex-shrink:0;
    }
    #status .dot { width:6px; height:6px; border-radius:50%; background:var(--muted); }
    #status.connected .dot { background:#4ECDC4; box-shadow:0 0 5px #4ECDC4; }
    #status.disconnected { color:var(--muted); }

    /* Viewport */
    #vp {
      position:fixed; top:52px; left:0; right:0; bottom:0;
      overflow:hidden; cursor:crosshair;
      background: #E8ECF0;  /* neutral grey outside canvas */
    }
    /* The dot grid sits between the grey bg and the drawing canvas */
    #dot-grid {
      position:absolute; top:0; left:0;
      transform-origin:0 0;  /* moves with canvas via JS */
      z-index:0; pointer-events:none;
    }
    #canvas { position:absolute; top:0; left:0; z-index:1; transform-origin:0 0; background:transparent; }

    #text-input {
      display:none; position:absolute; z-index:30;
      background:transparent; border:2px dashed var(--accent4); border-radius:4px;
      color:#333; padding:4px 8px; min-width:120px; min-height:32px;
      outline:none; resize:both; font-family:'Segoe UI',system-ui,sans-serif;
    }

    .rc { position:absolute; pointer-events:none; z-index:20; }
    .rc-dot { width:9px; height:9px; border-radius:50%; border:2px solid white; margin-left:-4px; margin-top:-4px; }
    .rc-label { font-size:9px; color:white; background:rgba(0,0,0,0.55); padding:1px 5px; border-radius:4px; margin-top:3px; white-space:nowrap; }

    #minimap {
      position:fixed; bottom:12px; right:12px; width:120px; height:80px;
      background:rgba(22,27,39,0.92); border:1px solid var(--border);
      border-radius:6px; z-index:50; overflow:hidden; cursor:pointer;
    }
    #mm-canvas { width:100%; height:100%; }
    #mm-vp { position:absolute; border:1.5px solid var(--accent2); border-radius:2px; pointer-events:none; background:rgba(78,205,196,0.08); }

    #toast {
      position:fixed; bottom:24px; left:50%;
      transform:translateX(-50%) translateY(60px);
      background:var(--panel); border:1px solid var(--border);
      color:var(--text); padding:7px 16px; border-radius:16px;
      font-size:11px; transition:transform 0.25s; pointer-events:none; z-index:200;
    }
    #toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="toolbar">
  <div id="logo">
    <svg width="30" height="30" viewBox="0 0 38 38" fill="none">
      <rect x="2" y="3" width="34" height="26" rx="3.5" fill="#FFFFFF" stroke="#4ECDC4" stroke-width="1.8"/>
      <line x1="14" y1="29" x2="11" y2="35" stroke="#4ECDC4" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="24" y1="29" x2="27" y2="35" stroke="#4ECDC4" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="10" y1="35" x2="28" y2="35" stroke="#4ECDC4" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="9" cy="10" r="0.9" fill="#CBD5E0"/><circle cx="19" cy="10" r="0.9" fill="#CBD5E0"/><circle cx="29" cy="10" r="0.9" fill="#CBD5E0"/>
      <circle cx="9" cy="16" r="0.9" fill="#CBD5E0"/><circle cx="19" cy="16" r="0.9" fill="#CBD5E0"/><circle cx="29" cy="16" r="0.9" fill="#CBD5E0"/>
      <circle cx="9" cy="22" r="0.9" fill="#CBD5E0"/><circle cx="19" cy="22" r="0.9" fill="#CBD5E0"/><circle cx="29" cy="22" r="0.9" fill="#CBD5E0"/>
      <line x1="9" y1="22" x2="19" y2="10" stroke="#FF6B6B" stroke-width="1" stroke-dasharray="2 1.5" opacity="0.6"/>
      <line x1="19" y1="10" x2="29" y2="22" stroke="#FF6B6B" stroke-width="1" stroke-dasharray="2 1.5" opacity="0.6"/>
      <line x1="9" y1="22" x2="29" y2="22" stroke="#FF6B6B" stroke-width="1" stroke-dasharray="2 1.5" opacity="0.6"/>
      <path d="M8 21 C11 14,16 18,19 11 C22 5,27 14,30 10" stroke="#FF6B6B" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <circle cx="9" cy="22" r="2.8" fill="#FF6B6B"/>
      <circle cx="19" cy="11" r="2.8" fill="#FFE66D" stroke="#FFC300" stroke-width="0.8"/>
      <circle cx="29" cy="22" r="2.8" fill="#4ECDC4"/>
    </svg>
    <span>NodeBoard</span>
  </div>
  <div class="sep"></div>
  <div class="tool-group">
    <button class="tb" data-tool="pan" data-tip="Pan (H)">✋</button>
  </div>
  <div class="sep"></div>
  <div class="tool-group">
    <button class="tb active" data-tool="pen"    data-tip="Pen">✒️</button>
    <button class="tb"        data-tool="marker" data-tip="Marker">🖊️</button>
    <button class="tb"        data-tool="brush"  data-tip="Brush">🖌️</button>
    <button class="tb"        data-tool="square" data-tip="Square">⬛</button>
    <button class="tb"        data-tool="eraser" data-tip="Eraser">🩹</button>
  </div>
  <div class="tool-group">
    <button class="tb" data-tool="shapes" data-tip="Shapes">⬡</button>
    <button class="tb" data-tool="text"   data-tip="Text">T</button>
  </div>
  <div id="shape-picker">
    <button class="sb active" data-shape="rect"     title="Rect">▭</button>
    <button class="sb"        data-shape="circle"   title="Circle">○</button>
    <button class="sb"        data-shape="arrow"    title="Arrow">→</button>
    <button class="sb"        data-shape="line"     title="Line">╱</button>
    <button class="sb"        data-shape="triangle" title="Triangle">△</button>
  </div>
  <div class="sep"></div>
  <input type="color" id="colorPicker" value="#FF6B6B" title="Color">
  <div class="sl-wrap">
    <label>Size</label>
    <input type="range" id="sizePicker" min="1" max="40" value="4">
    <span id="sizeVal">4</span>
  </div>
  <div class="sl-wrap">
    <label>Opacity</label>
    <input type="range" id="opacityPicker" min="10" max="100" value="100">
    <span id="opacityVal">100%</span>
  </div>
  <div class="sep"></div>
  <div id="zoom-controls">
    <button class="tb" id="zoom-out" data-tip="Zoom Out">−</button>
    <span id="zoom-level">100%</span>
    <button class="tb" id="zoom-in"  data-tip="Zoom In">+</button>
    <button class="tb" id="zoom-fit" data-tip="Reset" style="font-size:10px">⊞</button>
  </div>
  <div class="sep"></div>
  <div id="actions">
    <button class="ab" onclick="undoLast()">↩ Undo</button>
    <button class="ab danger" onclick="clearAll()">🗑 Clear</button>
  </div>
  <div id="status" class="disconnected">
    <span class="dot"></span>
    <span id="status-text">…</span>
  </div>
</div>

<div id="vp">
  <div id="dot-grid" style="width:6000px;height:4500px;background-image:radial-gradient(circle, rgba(148,163,184,0.55) 1px, transparent 1px);background-size:28px 28px;"></div>
  <canvas id="canvas"></canvas>
  <input type="text" id="text-input" placeholder="Type here…">
</div>

<div id="minimap">
  <canvas id="mm-canvas"></canvas>
  <div id="mm-vp"></div>
</div>

<div id="toast"></div>

<script>
const CANVAS_W = 6000, CANVAS_H = 4500;
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const vp     = document.getElementById('vp');
const ti     = document.getElementById('text-input');
const mmc    = document.getElementById('mm-canvas');
const mmctx  = mmc.getContext('2d');

canvas.width = CANVAS_W; canvas.height = CANVAS_H;
canvas.style.width = CANVAS_W + 'px'; canvas.style.height = CANVAS_H + 'px';
mmc.width = 120; mmc.height = 80;

// Viewport
let panX = 0, panY = 0, zoom = 0.35;

function initVP() {
  panX = (vp.offsetWidth  - CANVAS_W * zoom) / 2;
  panY = (vp.offsetHeight - CANVAS_H * zoom) / 2;
  applyT();
}

function applyT() {
  canvas.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  document.getElementById('zoom-level').textContent = Math.round(zoom*100)+'%';
  // Move dot-grid overlay with canvas transform
  const dg = document.getElementById('dot-grid');
  if(dg) dg.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  updateMM();
}

function toCanvas(vx, vy) {
  return { x:(vx-panX)/zoom, y:(vy-panY)/zoom };
}

// User ID
let userId = localStorage.getItem('wb_uid');
if (!userId) { userId='user_'+Math.random().toString(36).slice(2,9); localStorage.setItem('wb_uid',userId); }
const userColor = '#'+Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,'0');

// State
let tool='pen', shape='rect', drawing=false, panning=false;
let sx=0,sy=0,lx=0,ly=0, pid=0,pid0x=0,pid0y=0,ppx=0,ppy=0;
let sid=null, history=[], cursors={}, ptDist=null;
const localIds = new Set(); // strokeIds drawn locally — skip echo

// Tools
document.querySelectorAll('.tb[data-tool]').forEach(b => b.addEventListener('click', () => {
  const t = b.dataset.tool;
  if (t==='shapes') {
    const pk = document.getElementById('shape-picker');
    pk.classList.toggle('open');
    document.querySelectorAll('.tb').forEach(x=>x.classList.remove('active'));
    if (pk.classList.contains('open')) { b.classList.add('active'); tool='shapes'; }
    else { tool='pen'; document.querySelector('[data-tool="pen"]').classList.add('active'); }
  } else {
    document.querySelectorAll('.tb').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); tool=t;
    document.getElementById('shape-picker').classList.remove('open');
  }
  setCursor();
}));

document.querySelectorAll('.sb').forEach(b => b.addEventListener('click',()=>{
  document.querySelectorAll('.sb').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); shape=b.dataset.shape;
}));

function setCursor() {
  vp.style.cursor = tool==='pan'?'grab':tool==='eraser'?'cell':tool==='text'?'text':'crosshair';
}

const sp = document.getElementById('sizePicker');
const sv = document.getElementById('sizeVal');
const op = document.getElementById('opacityPicker');
const ov = document.getElementById('opacityVal');
const cp = document.getElementById('colorPicker');
sp.addEventListener('input',()=>sv.textContent=sp.value);
op.addEventListener('input',()=>ov.textContent=op.value+'%');

document.getElementById('zoom-in').addEventListener('click', ()=>adjZoom(0.15));
document.getElementById('zoom-out').addEventListener('click',()=>adjZoom(-0.15));
document.getElementById('zoom-fit').addEventListener('click',()=>{ zoom=1; initVP(); });

function adjZoom(d, pvx, pvy) {
  const old=zoom;
  zoom=Math.min(Math.max(zoom+d,0.15),4);
  const px=pvx??vp.offsetWidth/2, py=pvy??vp.offsetHeight/2;
  panX=px-(px-panX)*(zoom/old);
  panY=py-(py-panY)*(zoom/old);
  applyT();
}

document.addEventListener('keydown',e=>{
  if ((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undoLast();}
  if (e.key==='h'||e.key==='H') activateTool('pan');
  if (e.key==='p'||e.key==='P') activateTool('pen');
  if (e.key==='e'||e.key==='E') activateTool('eraser');
});

function activateTool(t) {
  document.querySelectorAll('.tb').forEach(x=>x.classList.remove('active'));
  const b=document.querySelector(`[data-tool="${t}"]`);
  if(b) b.classList.add('active');
  tool=t; setCursor();
}

// WebSocket
const proto = location.protocol==='https:'?'wss:':'ws:';
let ws;
function connect() {
  ws=new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen=()=>{ const e=document.getElementById('status'); e.className='connected'; document.getElementById('status-text').textContent='Live'; localIds.clear(); history=[]; };
  ws.onclose=()=>{ const e=document.getElementById('status'); e.className='disconnected'; document.getElementById('status-text').textContent='Off'; setTimeout(connect,2000); };
  ws.onmessage=e=>onEvent(JSON.parse(e.data));
}
connect();

function send(o) { if(ws&&ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify(o)); }

function onEvent(d) {
  if(d.type==='clear') {
    history=[]; localIds.clear();
    ctx.clearRect(0,0,CANVAS_W,CANVAS_H); updateMM(); return;
  }
  if(d.type==='redraw') {
    // Server sends authoritative history with every redraw (after undo)
    // Replace local history and repaint from scratch
    if(d.history) {
      history = d.history;
      localIds.clear();  // reset so replayed strokes aren't skipped
    }
    replay(); return;
  }
  if(d.type==='cursor') { showCursor(d); return; }
  // Regular drawing event — add to history
  history.push(d);
  // Skip rendering if WE already drew this stroke locally (optimistic render)
  const id = d.sid || d.strokeId;
  if(id && localIds.has(id)) { updateMM(); return; }
  render(d); updateMM();
}

function replay() {
  ctx.clearRect(0,0,CANVAS_W,CANVAS_H);
  history.forEach(render); updateMM();
}

function render(d) {
  if(d.type==='stroke') seg(d);
  else if(d.type==='shape') shp(d);
  else if(d.type==='text')  txt(d);
}

function newSid() { return userId+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,6); }

function cfg() {
  return { color:tool==='eraser'?'__erase__':cp.value, size:+sp.value, opacity:+op.value/100, tool };
}

function applyC(s) {
  if(s.color==='__erase__') { ctx.globalCompositeOperation='destination-out'; ctx.strokeStyle='rgba(0,0,0,1)'; }
  else { ctx.globalCompositeOperation='source-over'; ctx.strokeStyle=s.color; ctx.fillStyle=s.color; }
  ctx.globalAlpha=s.opacity??1;
  ctx.lineWidth=s.size; ctx.lineCap=s.tool==='square'?'square':'round'; ctx.lineJoin='round';
  if(s.tool==='marker'){ ctx.globalAlpha=(s.opacity||1)*0.6; ctx.lineWidth=s.size*2.5; ctx.lineCap='square'; }
  if(s.tool==='pen') ctx.lineWidth=Math.max(1,s.size*0.6);
}

function reset() { ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over'; }

function seg(d) { applyC(d); ctx.beginPath(); ctx.moveTo(d.x0,d.y0); ctx.lineTo(d.x1,d.y1); ctx.stroke(); reset(); }

function shp(d) {
  applyC(d); ctx.beginPath();
  const dx=d.x1-d.x0, dy=d.y1-d.y0;
  switch(d.shape) {
    case 'rect': ctx.strokeRect(d.x0,d.y0,dx,dy); break;
    case 'circle': { const cx=d.x0+dx/2,cy=d.y0+dy/2; ctx.ellipse(cx,cy,Math.abs(dx/2),Math.abs(dy/2),0,0,Math.PI*2); ctx.stroke(); break; }
    case 'line': ctx.moveTo(d.x0,d.y0); ctx.lineTo(d.x1,d.y1); ctx.stroke(); break;
    case 'triangle': ctx.moveTo(d.x0+dx/2,d.y0); ctx.lineTo(d.x0,d.y1); ctx.lineTo(d.x1,d.y1); ctx.closePath(); ctx.stroke(); break;
    case 'arrow': {
      ctx.moveTo(d.x0,d.y0); ctx.lineTo(d.x1,d.y1); ctx.stroke();
      const a=Math.atan2(dy,dx), hs=Math.max(10,d.size*3);
      ctx.beginPath();
      ctx.moveTo(d.x1,d.y1); ctx.lineTo(d.x1-hs*Math.cos(a-Math.PI/6),d.y1-hs*Math.sin(a-Math.PI/6));
      ctx.moveTo(d.x1,d.y1); ctx.lineTo(d.x1-hs*Math.cos(a+Math.PI/6),d.y1-hs*Math.sin(a+Math.PI/6));
      ctx.stroke(); break;
    }
  }
  reset();
}

function txt(d) { ctx.globalAlpha=d.opacity||1; ctx.fillStyle=d.color; ctx.font=`${d.size*4+10}px 'Segoe UI',sans-serif`; ctx.fillText(d.text,d.x,d.y); reset(); }

function preview(x0,y0,x1,y1) { replay(); const s=cfg(); applyC(s); shp({...s,shape,x0,y0,x1,y1}); }

// VP pos helpers
function vpPos(e) { const r=vp.getBoundingClientRect(); return {vx:e.clientX-r.left,vy:e.clientY-r.top}; }
function tpPos(t) { const r=vp.getBoundingClientRect(); return {vx:t.clientX-r.left,vy:t.clientY-r.top}; }

// MOUSE
vp.addEventListener('mousedown',e=>{
  const {vx,vy}=vpPos(e); const {x,y}=toCanvas(vx,vy);
  if(tool==='pan'){ panning=true; pid0x=vx; pid0y=vy; ppx=panX; ppy=panY; vp.style.cursor='grabbing'; return; }
  if(tool==='text'){ openTI(vx,vy,x,y); return; }
  drawing=true; sx=lx=x; sy=ly=y; sid=newSid();
});

vp.addEventListener('mousemove',e=>{
  const {vx,vy}=vpPos(e); const {x,y}=toCanvas(vx,vy);
  if(panning){ panX=ppx+(vx-pid0x); panY=ppy+(vy-pid0y); applyT(); return; }
  if(Math.random()<0.25) send({type:'cursor',userId,color:userColor,x,y});
  if(!drawing) return;
  if(tool==='shapes'){ preview(sx,sy,x,y); return; }
  const sd = {type:'stroke',sid,userId,x0:lx,y0:ly,x1:x,y1:y,...cfg()};
  localIds.add(sid);  // mark as locally rendered
  seg(sd);            // draw immediately — no waiting for server
  send(sd);
  lx=x; ly=y;
});

vp.addEventListener('mouseup',e=>{
  if(panning){ panning=false; setCursor(); return; }
  if(!drawing) return; drawing=false;
  const {vx,vy}=vpPos(e); const {x,y}=toCanvas(vx,vy);
  if(tool==='shapes') send({type:'shape',sid,userId,shape,x0:sx,y0:sy,x1:x,y1:y,...cfg()});
  sid=null;
});

vp.addEventListener('mouseleave',()=>{ drawing=false; panning=false; setCursor(); });

vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const {vx,vy}=vpPos(e);
  adjZoom(e.deltaY<0?0.1:-0.1,vx,vy);
},{passive:false});

// TOUCH
vp.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    drawing=false; panning=false;
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    ptDist=Math.sqrt(dx*dx+dy*dy); return;
  }
  const t=e.touches[0]; const {vx,vy}=tpPos(t); const {x,y}=toCanvas(vx,vy);
  if(tool==='pan'){ panning=true; pid0x=vx; pid0y=vy; ppx=panX; ppy=panY; return; }
  if(tool==='text'){ openTI(vx,vy,x,y); return; }
  drawing=true; sx=lx=x; sy=ly=y; sid=newSid();
},{passive:false});

vp.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(ptDist){
      const r=vp.getBoundingClientRect();
      const mx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left;
      const my=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;
      adjZoom((dist-ptDist)*0.008,mx,my);
    }
    ptDist=dist; return;
  }
  ptDist=null;
  const t=e.touches[0]; const {vx,vy}=tpPos(t); const {x,y}=toCanvas(vx,vy);
  if(panning){ panX=ppx+(vx-pid0x); panY=ppy+(vy-pid0y); applyT(); return; }
  if(!drawing) return;
  if(tool==='shapes'){ preview(sx,sy,x,y); return; }
  const sd2 = {type:'stroke',sid,userId,x0:lx,y0:ly,x1:x,y1:y,...cfg()};
  localIds.add(sid);
  seg(sd2);
  send(sd2);
  lx=x; ly=y;
},{passive:false});

vp.addEventListener('touchend',e=>{
  ptDist=null;
  if(panning){ panning=false; return; }
  if(!drawing) return; drawing=false;
  if(tool==='shapes'&&e.changedTouches.length){
    const t=e.changedTouches[0]; const {vx,vy}=tpPos(t); const {x,y}=toCanvas(vx,vy);
    send({type:'shape',sid,userId,shape,x0:sx,y0:sy,x1:x,y1:y,...cfg()});
  }
  sid=null;
},{passive:false});

vp.addEventListener('touchcancel',()=>{ drawing=false; panning=false; ptDist=null; },{passive:false});

// TEXT
let tcx=0,tcy=0;
function openTI(vx,vy,x,y) {
  tcx=x; tcy=y;
  ti.style.display='block'; ti.style.left=vx+'px'; ti.style.top=(vy-24)+'px';
  ti.style.color=cp.value; ti.style.fontSize=(+sp.value*4+10)+'px';
  ti.value=''; ti.focus();
}
ti.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();commitTI();} if(e.key==='Escape') ti.style.display='none'; });
ti.addEventListener('blur',commitTI);
function commitTI() { const t=ti.value.trim(); ti.style.display='none'; if(!t) return; send({type:'text',sid:newSid(),userId,text:t,x:tcx,y:tcy,...cfg()}); }

// UNDO / CLEAR
function undoLast() {
  // Find last stroke by this user in local history
  let tid=null;
  for(let i=history.length-1;i>=0;i--) {
    const e=history[i];
    if(e.userId===userId && e.type!=='cursor' && e.type!=='clear') {
      tid = e.sid || e.strokeId;
      break;
    }
  }
  if(!tid){ toast('Nothing to undo'); return; }
  // Remove locally immediately (optimistic)
  history=history.filter(e=>(e.sid||e.strokeId)!==tid);
  localIds.delete(tid);
  replay();
  // Tell server — it will remove from Redis and broadcast authoritative history
  send({type:'undo', userId, strokeId:tid});
  toast('Undone ↩');
}

function clearAll() {
  if(!confirm('Clear the board for everyone?')) return;
  history=[]; ctx.clearRect(0,0,CANVAS_W,CANVAS_H); updateMM();
  send({type:'clear'});
}

// CURSORS
function showCursor(d) {
  if(d.userId===userId) return;
  let info=cursors[d.userId];
  if(!info){
    const el=document.createElement('div'); el.className='rc';
    el.innerHTML=`<div class="rc-dot" style="background:${d.color}"></div><div class="rc-label" style="background:${d.color}">${d.userId.slice(5,9)}</div>`;
    vp.appendChild(el); info={el}; cursors[d.userId]=info;
  }
  info.el.style.left=(d.x*zoom+panX)+'px';
  info.el.style.top=(d.y*zoom+panY)+'px';
  clearTimeout(info.t);
  info.t=setTimeout(()=>{ info.el.remove(); delete cursors[d.userId]; },3000);
}

// MINIMAP — throttled to avoid killing mobile performance
let mmPending = false;
function updateMM() {
  if(mmPending) return;
  mmPending = true;
  requestAnimationFrame(() => { mmPending = false; _updateMM(); });
}
function _updateMM() {
  mmctx.fillStyle='#1A2438'; mmctx.fillRect(0,0,120,80);
  mmctx.drawImage(canvas,0,0,120,80);
  const vw=vp.offsetWidth, vh=vp.offsetHeight;
  const sx2=120/CANVAS_W, sy2=80/CANVAS_H;
  const rx=(-panX/zoom)*sx2, ry=(-panY/zoom)*sy2;
  const rw=(vw/zoom)*sx2, rh=(vh/zoom)*sy2;
  const mv=document.getElementById('mm-vp');
  mv.style.left=Math.max(0,rx)+'px'; mv.style.top=Math.max(0,ry)+'px';
  mv.style.width=Math.min(rw,120)+'px'; mv.style.height=Math.min(rh,80)+'px';
}

document.getElementById('minimap').addEventListener('click',e=>{
  const r=document.getElementById('minimap').getBoundingClientRect();
  const cx=(e.clientX-r.left)/120*CANVAS_W;
  const cy=(e.clientY-r.top)/80*CANVAS_H;
  panX=vp.offsetWidth/2-cx*zoom; panY=vp.offsetHeight/2-cy*zoom; applyT();
});

// TOAST
let tt;
function toast(m) {
  const e=document.getElementById('toast'); e.textContent=m; e.classList.add('show');
  clearTimeout(tt); tt=setTimeout(()=>e.classList.remove('show'),2000);
}

window.addEventListener('resize',()=>applyT());
initVP();
</script>
